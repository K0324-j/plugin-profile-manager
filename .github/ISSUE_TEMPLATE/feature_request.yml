name: Feature request
description: Suggest an improvement for Plugin Profile Manager
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. Please describe the workflow rather than only the UI control you want.
  - type: textarea
    id: problem
    attributes:
      label: Problem or workflow
      description: What are you trying to manage?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would make this workflow easier?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional alternatives or workarounds.
